[pytest]
minversion = 9.0
addopts = -ra -q -m "not integration"
testpaths = tests
pythonpath = src
asyncio_mode = auto
markers =
    integration: marks tests as integration tests that require network access
filterwarnings =
    ignore:'audioop' is deprecated:DeprecationWarning
    ignore:.*asyncio.iscoroutinefunction.*:DeprecationWarning
